version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/poopilot
    binary: poopilot
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/Damnatti/poopilot/internal/cli.Version={{ .Version }}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

brews:
  - repository:
      owner: denismelnikov
      name: homebrew-tap
    homepage: https://github.com/Damnatti/poopilot
    description: "Control your AI coding agents from your phone — zero servers, pure P2P"
    license: MIT
    install: |
      bin.install "poopilot"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
